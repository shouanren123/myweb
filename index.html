<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的个人网页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: #f5f7fa;
      color: #333;
      line-height: 1.6;
    }
    .container {
      max-width: 800px;
      margin: 60px auto;
      padding: 0 20px;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 20px;
      color: #222;
    }
    p {
      font-size: 18px;
      margin-bottom: 14px;
      color: #555;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #409eff;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-size: 16px;
    }
    .btn:hover {
      background: #338ecc;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>你好，这是我的网页</h1>
      <p>这个网站已经部署在 GitHub Pages 上</p>
      <p>任何人都可以通过链接访问我</p>
      <a href="https://github.com" class="btn">访问 GitHub</a>
    </div>
  </div>
</body>
</html>
